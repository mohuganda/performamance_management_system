services:
  mysql:
    image: mysql:8.4
    container_name: moh-pms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ${DATA_DIR}/mysql:/var/lib/mysql
      - ../database/sql/legacy/01_legacy_source_tables.sql:/docker-entrypoint-initdb.d/01_legacy_source_tables.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
    profiles:
      - app

  redis:
    image: redis:7-alpine
    container_name: moh-pms-redis
    restart: unless-stopped
    volumes:
      - ${DATA_DIR}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles:
      - app

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: moh-pms-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      APP_HOST: 0.0.0.0
      APP_PORT: 3030
      APP_KEY: ${APP_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_DRIVER: redis
      SESSION_LIFETIME: 120
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IHRIS_USE_DEMO_DATA: ${IHRIS_USE_DEMO_DATA}
      LOAD_DEMO_DATA: ${LOAD_DEMO_DATA}
    volumes:
      - ${DATA_DIR}/storage:/app/storage
    expose:
      - "3030"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3030/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 300s
    profiles:
      - app

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: moh-pms-web
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    profiles:
      - app

  gateway:
    image: nginx:1.27-alpine
    container_name: moh-pms-gateway
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - app

