services:
  mysql:
    image: mysql:8.4
    container_name: moh-pms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: moh_pms
      MYSQL_USER: pms
      MYSQL_PASSWORD: pms_secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/sql/legacy/01_legacy_source_tables.sql:/docker-entrypoint-initdb.d/01_legacy_source_tables.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s

  redis:
    image: redis:7-alpine
    container_name: moh-pms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moh-pms-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: MoH-PMS
      APP_ENV: production
      APP_DEBUG: "false"
      APP_HOST: 0.0.0.0
      APP_PORT: 3030
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: moh_pms
      DB_USERNAME: pms
      DB_PASSWORD: pms_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IHRIS_USE_DEMO_DATA: "true"
      LOAD_DEMO_DATA: "true"
    ports:
      - "3030:3030"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moh-pms-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:3030/api/v1
    ports:
      - "5173:5173"

volumes:
  mysql_data:
  redis_data:
